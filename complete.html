<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyBuddy – Session complete</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex">

  <aside class="d-none d-md-block">
    <h5>StudyBuddy</h5>
    <nav class="nav nav-pills flex-column gap-1">
      <a href="index.html"       class="nav-link">Home</a>
      <a href="new-session.html" class="nav-link">New session</a>
      <a href="timer.html"       class="nav-link">Timer</a>
      <a href="history.html"     class="nav-link">History</a>
    </nav>
  </aside>

  <main class="flex-grow-1">
    <div class="page-header">
      <h4 class="page-title">Session complete!</h4>
    </div>

    <div class="finish-card">
      <h4>Add a quick note...</h4>
      <div class="subtitle">Today I learned...</div>
      <textarea id="quickNote" class="note-area" placeholder="Today I learned..."></textarea>
      <div class="finish-actions">
        <button id="saveNoteBtn" class="btn-save">⬆ Save</button>
        <button id="skipNoteBtn" class="btn-skip">Skip note</button>
      </div>
    </div>
  </main>

</div>

<nav class="mobile-nav d-md-none">
  <a href="index.html">
    <span class="nav-icon">★</span>
    <span>Home</span>
  </a>
  <a href="new-session.html">
    <span class="nav-icon">+</span>
    <span>New session</span>
  </a>
  <a href="history.html">
    <span class="nav-icon">◷</span>
    <span>History</span>
  </a>
</nav>

<script>
  document.getElementById('saveNoteBtn').addEventListener('click', function() {
    window.location.href = 'history.html';
  });
  document.getElementById('skipNoteBtn').addEventListener('click', function() {
    window.location.href = 'history.html';
  });
</script>
</body>
</html>
