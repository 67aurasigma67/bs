<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyBuddy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex">

  <aside class="d-none d-md-block">
    <h5>StudyBuddy</h5>
    <nav class="nav nav-pills flex-column gap-1">
      <a href="index.html"       class="nav-link active">Home</a>
      <a href="new-session.html" class="nav-link">New session</a>
      <a href="timer.html"       class="nav-link">Timer</a>
      <a href="history.html"     class="nav-link">History</a>
    </nav>
  </aside>

  <main class="flex-grow-1">
    <div class="page-header">
      <h4 class="page-title">Welcome back!</h4>
      <div class="avatar">A</div>
    </div>

    <div class="quick-start-card">
      <div>
        <div class="label">Quick start:</div>
        <div class="subject-name">Last session: Matematika</div>
      </div>
      <button class="play-btn" onclick="go('Matematika', 55, 4)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>

    <div class="section-label">Subjects</div>

    <div class="subject-card">
      <div>
        <div class="subject-name">Matematika</div>
        <div class="subject-meta">55 min · 1/4</div>
      </div>
      <button class="play-btn" onclick="go('Matematika', 55, 4)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>

    <div class="subject-card">
      <div>
        <div class="subject-name">Fizika</div>
        <div class="subject-meta">40 min · 3/4</div>
      </div>
      <button class="play-btn" onclick="go('Fizika', 40, 4)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>

    <div class="subject-card">
      <div>
        <div class="subject-name">Srpski</div>
        <div class="subject-meta">25 min · 0/4</div>
      </div>
      <button class="play-btn" onclick="go('Srpski', 25, 4)">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
  </main>

</div>

<a href="new-session.html" class="desktop-fab">
  <span>+</span> New session
</a>

<nav class="mobile-nav d-md-none">
  <a href="index.html" class="active">
    <span class="nav-icon">★</span>
    <span>Home</span>
  </a>
  <a href="new-session.html">
    <span class="nav-icon">+</span>
    <span>New session</span>
  </a>
  <a href="history.html">
    <span class="nav-icon">◷</span>
    <span>History</span>
  </a>
</nav>

<script>
  function go(subject, duration, repeats) {
    sessionStorage.setItem('session', JSON.stringify({ subject, duration, repeats }));
    window.location.href = 'timer.html';
  }
</script>
</body>
</html>
